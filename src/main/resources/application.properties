server.port=8080

spring.application.name=IHEC-JLearn
spring.profiles.active=dev

# Firebase Configuration
firebase.database.url=${FIREBASE_DATABASE_URL:https://your-project.firebaseio.com}
firebase.config.path=${FIREBASE_CONFIG_PATH:firebase-config.json}

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.com.ihec=DEBUG

# Application Settings
app.jwt.secret=your-secret-key-change-in-production
app.jwt.expiration=86400000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.resources.cache.period=3600
