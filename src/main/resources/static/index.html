<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHEC-JLearn</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px),
                linear-gradient(0deg, rgba(15, 118, 110, 0.06) 1px, transparent 1px),
                linear-gradient(135deg, #f8fbff 0%, #eef6f9 100%);
            background-size: 48px 48px, 48px 48px, auto;
        }
        .loading-container {
            text-align: center;
            color: var(--ink);
            padding: 32px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(219, 227, 239, 0.88);
            box-shadow: var(--shadow-lg);
        }
        .spinner {
            border: 4px solid var(--light-blue);
            border-radius: 50%;
            border-top: 4px solid var(--primary-blue);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading IHEC-JLearn...</p>
    </div>

    <script>
        // Redirect to appropriate page based on authentication
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');

            if (token && user) {
                const userData = JSON.parse(user);
                if (userData.role === 'ADMIN') {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } else {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
